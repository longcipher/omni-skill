name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
          - "3.13"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install dependencies
        run: just sync

      - name: Run tests
        run: just test

      - name: Run BDD scenarios
        run: just bdd

  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install typos
        uses: crate-ci/typos@master

      - name: Install rumdl
        run: uv tool install rumdl

      - name: Install dependencies
        run: just sync

      - name: Run lint
        run: just lint

      - name: Build distributions
        run: just build
